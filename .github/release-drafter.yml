name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Categories align with Keep a Changelog (https://keepachangelog.com/en/1.1.0/).
# Output of this drafter is designed to be appendable to CHANGELOG.md.
categories:
  - title: 'Added'
    labels:
      - 'feature'
      - 'enhancement'
      - 'minor'
  - title: 'Changed'
    labels:
      - 'chore'
      - 'maintenance'
      - 'refactor'
      - 'dependencies'
      - 'architecture'
      - 'adr'
  - title: 'Deprecated'
    labels:
      - 'deprecation'
  - title: 'Removed'
    labels:
      - 'removal'
      - 'breaking'
      - 'breaking-change'
      - 'major'
  - title: 'Fixed'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
      - 'patch'
      - 'test'
      - 'tests'
  - title: 'Security'
    labels:
      - 'security'
      - 'vulnerability'
  - title: 'Docs'
    labels:
      - 'documentation'
      - 'docs'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
      - 'breaking-change'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bugfix'
      - 'bug'
      - 'chore'
      - 'maintenance'
      - 'documentation'
      - 'test'
      - 'tests'
      - 'refactor'
      - 'dependencies'
  default: patch

autolabeler:
  - label: 'breaking'
    title:
      - '/(?i)breaking/gi'
    body:
      - '/(?i)breaking change/gi'
  - label: 'feature'
    title:
      - '/(?i)feat/gi'
      - '/(?i)feature/gi'
    files:
      - 'src/tools/*'
      - 'src/utils/*'
  - label: 'bug'
    title:
      - '/(?i)fix/gi'
      - '/(?i)bug/gi'
  - label: 'test'
    title:
      - '/(?i)test/gi'
    files:
      - 'tests/**/*'
      - '**/*.test.ts'
      - '**/*.spec.ts'
  - label: 'documentation'
    title:
      - '/(?i)docs/gi'
      - '/(?i)documentation/gi'
    files:
      - 'docs/**/*'
      - 'README.md'
      - '*.md'
  - label: 'maintenance'
    title:
      - '/(?i)chore/gi'
      - '/(?i)maintenance/gi'
      - '/(?i)refactor/gi'
  - label: 'dependencies'
    title:
      - '/(?i)bump/gi'
      - '/(?i)update.*dependencies/gi'
    files:
      - 'package*.json'
      - 'yarn.lock'
  - label: 'smart-code-linking'
    title:
      - '/(?i)smart.*code.*linking/gi'
      - '/(?i)code.*linking/gi'
    files:
      - 'src/utils/file-system.ts'
      - 'src/utils/find-related-code.ts'
      - 'tests/**/*smart-code-linking*'
  - label: 'architecture'
    title:
      - '/(?i)adr/gi'
      - '/(?i)architecture/gi'
    files:
      - 'docs/adrs/**/*'
      - 'src/tools/*adr*'

# Keep a Changelog-compatible template. Paste sections into CHANGELOG.md under
# `## [$RESOLVED_VERSION] — YYYY-MM-DD` when cutting a release.
template: |
  ## [$RESOLVED_VERSION] — $TODAY

  $CHANGES

  **Full Changelog**: https://github.com/tosin2013/mcp-adr-analysis-server/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

  ## Installation

  ```bash
  npm install -g mcp-adr-analysis-server@$RESOLVED_VERSION
  ```

exclude-labels:
  - 'skip-changelog'
  - 'no-release'

include-pre-releases: false
