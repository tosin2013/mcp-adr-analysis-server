# Canonical label taxonomy for mcp-adr-analysis-server
# Managed by .github/workflows/label-sync.yml (EndBug/label-sync@v2)
# delete-other-labels: false — existing labels not listed here are left intact during migration.

# ── Priority ──────────────────────────────────────────────────────────────────
# Canonical: priority:critical / priority:high / priority:medium / priority:low
# Retiring:  critical, high, high-priority, priority-high, priority-medium

- name: 'priority:critical'
  color: 'B60205'
  description: 'Highest priority — needs immediate attention'

- name: 'priority:high'
  color: 'D93F0B'
  description: 'High priority — should be addressed soon'

- name: 'priority:medium'
  color: 'FBCA04'
  description: 'Medium priority — important but not urgent'

- name: 'priority:low'
  color: 'FEF2C0'
  description: 'Low priority — nice to have'

# ── Type ──────────────────────────────────────────────────────────────────────
# Canonical: bug, enhancement, documentation, technical-debt, breaking-change
# Retiring:  tech-debt, type:bug

- name: 'bug'
  color: 'd73a4a'
  description: "Something isn't working"

- name: 'enhancement'
  color: 'a2eeef'
  description: 'New feature or request'

- name: 'documentation'
  color: '0075ca'
  description: 'Improvements or additions to documentation'

- name: 'technical-debt'
  color: 'e4e669'
  description: 'Code quality or architectural cleanup'

- name: 'breaking-change'
  color: 'B60205'
  description: 'Introduces a breaking API or behaviour change'

- name: 'refactoring'
  color: 'c5def5'
  description: 'Code restructuring without changing external behaviour'

- name: 'performance'
  color: '0052cc'
  description: 'Performance improvement or regression'

- name: 'security'
  color: 'ee0701'
  description: 'Security fix or hardening'

- name: 'dependencies'
  color: '0366d6'
  description: 'Dependency update or removal'

