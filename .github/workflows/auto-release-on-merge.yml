name: Auto Release on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  auto-release:
    # Only run if PR was merged (not just closed) and not already handled by dependabot workflow
    if: github.event.pull_request.merged == true && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.bump-version.outputs.version }}
      should-publish: ${{ steps.publish-gate.outputs.should_publish }}
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Capture merge commit SHA
        id: merge-sha
        run: |
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"

          if [[ -z "$MERGE_SHA" || "$MERGE_SHA" == "null" ]]; then
            echo "⚠️ merge_commit_sha is missing; falling back to github.sha"
            MERGE_SHA="${{ github.sha }}"
          fi

          if ! git fetch origin main; then
            echo "❌ Failed to fetch origin/main. Aborting to avoid tagging an incorrect commit."
            exit 1
          fi

          ORIGIN_MAIN_SHA="$(git rev-parse origin/main)"

          if ! git cat-file -e "${MERGE_SHA}^{commit}" 2>/dev/null; then
            echo "⚠️ merge_commit_sha not found in local checkout; using origin/main HEAD"
            MERGE_SHA="$ORIGIN_MAIN_SHA"
          fi

          if [[ "$MERGE_SHA" != "$ORIGIN_MAIN_SHA" ]] && ! git merge-base --is-ancestor "$MERGE_SHA" "$ORIGIN_MAIN_SHA"; then
            echo "⚠️ merge_commit_sha is not on origin/main; using origin/main HEAD instead"
            MERGE_SHA="$ORIGIN_MAIN_SHA"
          fi

          echo "sha=$MERGE_SHA" >> $GITHUB_OUTPUT
          echo "Merge commit SHA: $MERGE_SHA"

      - name: Check auto-release configuration
        id: config
        run: |
          if [[ -f ".github/auto-release.config.json" ]]; then
            ENABLED=$(jq -r '.enabled' .github/auto-release.config.json)
            SKIP_LABELS=$(jq -r '.skipLabels[]' .github/auto-release.config.json | tr '\n' ' ')
            echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
            echo "skip_labels=$SKIP_LABELS" >> $GITHUB_OUTPUT
            echo "Auto-release enabled: $ENABLED"
            echo "Skip labels: $SKIP_LABELS"
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "skip_labels=" >> $GITHUB_OUTPUT
            echo "No config found, using defaults"
          fi

      - name: Check if release should be skipped
        id: should-skip
        run: |
          PR_LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
          SKIP_LABELS="${{ steps.config.outputs.skip_labels }}"

          for label in $SKIP_LABELS; do
            if [[ "$PR_LABELS" == *"$label"* ]]; then
              echo "should_skip=true" >> $GITHUB_OUTPUT
              echo "🚫 Skipping release due to label: $label"
              exit 0
            fi
          done

          echo "should_skip=false" >> $GITHUB_OUTPUT
          echo "✅ Release should proceed"

      - name: Set publish gate output
        id: publish-gate
        env:
          SHOULD_SKIP: ${{ steps.should-skip.outputs.should_skip }}
          CONFIG_ENABLED: ${{ steps.config.outputs.enabled }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Compute the gate explicitly. This is the single source of truth for
          # whether publish-npm should run. Do NOT re-evaluate github.event
          # context in the publish-npm job — the downstream evaluation has been
          # unreliable historically (see #787).
          if [[ "$CONFIG_ENABLED" != "true" ]]; then
            GATE="false"
            REASON="auto-release disabled in .github/auto-release.config.json"
          elif [[ "$SHOULD_SKIP" == "true" ]]; then
            GATE="false"
            REASON="PR carries a skip-release label"
          elif [[ "$PR_MERGED" != "true" ]]; then
            GATE="false"
            REASON="PR was not merged"
          elif [[ "$PR_AUTHOR" == "dependabot[bot]" ]]; then
            GATE="false"
            REASON="Dependabot PRs are handled by dependabot-auto-merge.yml"
          else
            GATE="true"
            REASON="All preconditions met"
          fi

          echo "should_publish=$GATE" >> $GITHUB_OUTPUT
          echo "gate_reason=$REASON" >> $GITHUB_OUTPUT

          # Surface the decision in workflow logs + step summary so future
          # debugging does not require guessing at context values.
          echo "::notice::publish gate = $GATE ($REASON)"
          {
            echo "## Publish gate decision"
            echo ""
            echo "| Input | Value |"
            echo "|---|---|"
            echo "| config.enabled | \`$CONFIG_ENABLED\` |"
            echo "| should_skip | \`$SHOULD_SKIP\` |"
            echo "| pr.merged | \`$PR_MERGED\` |"
            echo "| pr.author | \`$PR_AUTHOR\` |"
            echo ""
            echo "**Decision**: \`should_publish=$GATE\` — $REASON"
          } >> $GITHUB_STEP_SUMMARY

      - name: Determine version bump type
        id: version-type
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "Analyzing PR: ${PR_TITLE}"
          echo "Labels: ${{ join(github.event.pull_request.labels.*.name, ', ') }}"

          # Check for breaking changes or major version indicators
          if [[ "${PR_TITLE}" == *"BREAKING"* ]] || [[ "${PR_TITLE}" == *"breaking"* ]] || \
             [[ "${PR_LABELS}" == *"breaking"* ]] || [[ "${PR_LABELS}" == *"major"* ]] || \
             [[ "${PR_BODY}" == *"BREAKING CHANGE"* ]]; then
            VERSION_TYPE="major"
            echo "🚨 Major version bump detected (breaking changes)"
          # Check for features or minor version indicators
          elif [[ "${PR_TITLE}" == *"feat"* ]] || [[ "${PR_TITLE}" == *"feature"* ]] || \
               [[ "${PR_LABELS}" == *"feature"* ]] || [[ "${PR_LABELS}" == *"enhancement"* ]] || \
               [[ "${PR_LABELS}" == *"minor"* ]]; then
            VERSION_TYPE="minor"
            echo "✨ Minor version bump detected (new features)"
          # Default to patch for fixes, chores, docs, etc.
          else
            VERSION_TYPE="patch"
            echo "🔧 Patch version bump detected (fixes/chores)"
          fi

          echo "version_type=$VERSION_TYPE" >> $GITHUB_OUTPUT
          echo "Version bump type: $VERSION_TYPE"

      - name: Bump version
        id: bump-version
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false'
        run: |
          echo "Bumping version with type: ${{ steps.version-type.outputs.version_type }}"

          # Bump version without creating git tag (we'll do that separately)
          npm version ${{ steps.version-type.outputs.version_type }} --no-git-tag-version

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Find Release Drafter draft
        id: find-draft
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false'
        run: |
          echo "🔍 Looking for Release Drafter draft..."

          # Get the latest draft release
          DRAFT_RELEASE=$(gh api repos/${{ github.repository }}/releases \
            --jq '.[] | select(.draft == true) | select(.name | test("v?[0-9]+\\.[0-9]+\\.[0-9]+")) | .[0]' \
            | head -1)

          if [[ -n "$DRAFT_RELEASE" ]]; then
            DRAFT_ID=$(echo "$DRAFT_RELEASE" | jq -r '.id')
            DRAFT_TAG=$(echo "$DRAFT_RELEASE" | jq -r '.tag_name')
            DRAFT_NAME=$(echo "$DRAFT_RELEASE" | jq -r '.name')
            DRAFT_BODY=$(echo "$DRAFT_RELEASE" | jq -r '.body')

            echo "draft_found=true" >> $GITHUB_OUTPUT
            echo "draft_id=$DRAFT_ID" >> $GITHUB_OUTPUT
            echo "draft_tag=$DRAFT_TAG" >> $GITHUB_OUTPUT
            echo "draft_name=$DRAFT_NAME" >> $GITHUB_OUTPUT

            # Save draft body for later enhancement
            echo "$DRAFT_BODY" > draft_body.md

            echo "✅ Found Release Drafter draft: $DRAFT_NAME (ID: $DRAFT_ID)"
          else
            echo "draft_found=false" >> $GITHUB_OUTPUT
            echo "⚠️ No Release Drafter draft found, will create basic release notes"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update draft with current PR info
        id: update-draft
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          if [[ "${{ steps.find-draft.outputs.draft_found }}" == "true" ]]; then
            echo "📝 Updating Release Drafter content with current PR..."

            # Update the draft tag to match our new version
            NEW_TAG="v${{ env.NEW_VERSION }}"
            NEW_NAME="Release v${{ env.NEW_VERSION }}"

            # Get existing draft body and enhance it
            DRAFT_BODY=$(cat draft_body.md)

            # Create enhanced release notes combining draft structure with current PR
            cat > enhanced_release_notes.md << EOF
          $DRAFT_BODY

          ## 🔄 Auto-Release Information

          This release was automatically triggered by:
          - **PR**: $PR_TITLE (#$PR_NUMBER)
          - **Author**: @$PR_AUTHOR
          - **Type**: ${{ steps.version-type.outputs.version_type }} version bump

          **Full PR Details**: [View PR]($PR_URL)

          ---
          🤖 Auto-generated release following PR merge
          EOF

            echo "updated_tag=$NEW_TAG" >> $GITHUB_OUTPUT
            echo "updated_name=$NEW_NAME" >> $GITHUB_OUTPUT
            echo "✅ Enhanced release notes prepared"
          else
            # Fallback: create basic release notes
            cat > enhanced_release_notes.md << EOF
          # Release v${{ env.NEW_VERSION }}

          ## Changes
          - $PR_TITLE (#$PR_NUMBER) by @$PR_AUTHOR

          **Full Changelog**: [View PR]($PR_URL)

          ---
          🤖 Auto-generated release following PR merge
          EOF

            echo "updated_tag=v${{ env.NEW_VERSION }}" >> $GITHUB_OUTPUT
            echo "updated_name=Release v${{ env.NEW_VERSION }}" >> $GITHUB_OUTPUT
            echo "⚠️ Created fallback release notes"
          fi

          echo "Generated enhanced release notes:"
          cat enhanced_release_notes.md

      # ---------------------------------------------------------------------
      # FIX FOR MALFORMED-TAG BUG:
      # Previously this workflow tagged `steps.merge-sha.outputs.sha` (the
      # original PR's squash merge commit) IMMEDIATELY, then opened a separate
      # version-bump PR that merged later. The result was every tag pointed
      # one commit too early — its package.json still showed the OLD version.
      # That broke `npm publish` ("You cannot publish over the previously
      # published versions: X") and silently shipped wrong tarballs.
      #
      # New flow:
      #   1. Open the version-bump PR FIRST (peter-evans/create-pull-request).
      #   2. Enable auto-merge on it.
      #   3. Wait synchronously for it to merge (poll up to ~20 min).
      #   4. THEN tag the version-bump squash SHA — at which point
      #      package.json on that commit matches the tag name.
      #   5. Then create the GitHub release on that correct tag.
      #
      # Trade-off: workflow runtime grows by however long the bump-PR CI
      # takes (typically 5–10 min). That's a fair price for tags that npm
      # can actually publish.
      # ---------------------------------------------------------------------
      #
      # FIX FOR BOT-PR / NO-CI BUG:
      # GitHub deliberately suppresses workflow runs for events authored by
      # the default `GITHUB_TOKEN` (to prevent recursive workflow loops). So
      # if we open the version-bump PR with `secrets.GITHUB_TOKEN`, NO CI
      # will run on it, branch protection blocks the merge, auto-merge sits
      # idle, and the wait-for-merge step below times out at 20 minutes —
      # leaving an orphaned bump PR that someone has to babysit (PR #877 hit
      # this exact pattern).
      #
      # Fix: prefer `secrets.RELEASE_TOKEN` (a PAT or GitHub App token) when
      # available. PRs created with a non-default token DO trigger CI, which
      # in turn unblocks auto-merge, which unblocks tagging, end-to-end.
      #
      # If `RELEASE_TOKEN` is NOT set, we transparently fall back to
      # `GITHUB_TOKEN` and emit a clear warning. The bump PR is still
      # created; CI just won't fire automatically and a maintainer has to
      # manually close+reopen the PR (or push an empty commit) to kick CI.
      # See `Token-fallback notice` step below.
      #
      # To enable full automation: create a PAT with `repo` scope (or a
      # fine-grained PAT with `Contents: Read & Write` and `Pull requests:
      # Read & Write`), then add it as the `RELEASE_TOKEN` repo secret.
      # ---------------------------------------------------------------------

      - name: Token-fallback notice
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false'
        run: |
          if [[ -n "${{ secrets.RELEASE_TOKEN }}" ]]; then
            echo "::notice::Using RELEASE_TOKEN (PAT/App) to author the version-bump PR — CI will fire automatically and auto-merge will complete end-to-end."
          else
            echo "::warning::RELEASE_TOKEN secret is not set — falling back to GITHUB_TOKEN. The version-bump PR will be opened, but GitHub will NOT trigger CI on it (workflows authored by GITHUB_TOKEN are suppressed). A maintainer will need to either close+reopen the PR or push an empty commit to its branch to kick CI. To enable full automation, create a PAT with 'Contents: Read & Write' + 'Pull requests: Read & Write' and add it as the RELEASE_TOKEN repo secret."
          fi

      - name: Create version-bump PR
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false'
        id: version-bump-pr
        uses: peter-evans/create-pull-request@v8
        with:
          # Prefer RELEASE_TOKEN (a PAT or GitHub App token) so the PR
          # triggers CI normally. Fall back to GITHUB_TOKEN — see the
          # Token-fallback notice step above for the consequences.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: 'chore: bump version to v${{ env.NEW_VERSION }}'
          title: 'chore: bump version to v${{ env.NEW_VERSION }}'
          body: |
            ## Version Bump

            Automated version bump to **v${{ env.NEW_VERSION }}** following release.

            - **Triggered by**: ${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})
            - **Author**: @${{ github.event.pull_request.user.login }}
            - **Bump type**: ${{ steps.version-type.outputs.version_type }}

            > This PR updates `package.json` and `package-lock.json` only.
            > The `no-release` label prevents this merge from triggering another release.
            >
            > The auto-release workflow that opened this PR is **waiting**
            > for it to merge so it can tag the resulting commit (where
            > package.json correctly says v${{ env.NEW_VERSION }}). Do not
            > close this PR without merging unless you also intend to abort
            > the release.
            >
            > **If CI did not run on this PR**, the parent workflow opened it
            > with the default `GITHUB_TOKEN` (because the `RELEASE_TOKEN`
            > repo secret is not set). To kick CI, either:
            > 1. Close and immediately reopen this PR, OR
            > 2. Push an empty commit to its branch.
            >
            > To enable full hands-off automation in the future, create a
            > PAT (or GitHub App) with `Contents: Read & Write` and `Pull
            > requests: Read & Write`, and add it as the `RELEASE_TOKEN`
            > repo secret.
          branch: chore/version-bump-v${{ env.NEW_VERSION }}
          base: main
          delete-branch: true
          add-paths: |
            package.json
            package-lock.json
          labels: |
            no-release
            maintenance

      - name: Enable auto-merge for version-bump PR
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false' && steps.version-bump-pr.outputs.pull-request-number
        run: |
          if gh pr merge ${{ steps.version-bump-pr.outputs.pull-request-number }} --auto --squash 2>/dev/null; then
            echo "✅ Auto-merge enabled for version-bump PR #${{ steps.version-bump-pr.outputs.pull-request-number }}"
          else
            echo "::warning::Could not enable auto-merge for version-bump PR #${{ steps.version-bump-pr.outputs.pull-request-number }} — falling back to wait-for-manual-merge"
          fi
        env:
          # Same token fallback as the PR-creation step. When RELEASE_TOKEN
          # is present, the auto-merge action is recorded as that identity,
          # which interacts more cleanly with branch protection in some
          # configurations.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Wait for version-bump PR to merge
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false' && steps.version-bump-pr.outputs.pull-request-number
        env:
          # Read-only checks; either token works. Keep on RELEASE_TOKEN
          # fallback for symmetry with sibling steps.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.version-bump-pr.outputs.pull-request-number }}
          USING_PAT: ${{ secrets.RELEASE_TOKEN != '' }}
        run: |
          set -euo pipefail
          echo "Waiting for version-bump PR #$PR_NUMBER to merge (poll every 30s for up to 20 min)..."

          # 40 attempts * 30s = 1200s (20 min) — enough for typical CI runs
          for i in $(seq 1 40); do
            STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state')

            if [[ "$STATE" == "MERGED" ]]; then
              BUMP_SHA=$(gh pr view "$PR_NUMBER" --json mergeCommit --jq '.mergeCommit.oid')
              if [[ -z "$BUMP_SHA" || "$BUMP_SHA" == "null" ]]; then
                echo "::error::PR #$PR_NUMBER is MERGED but mergeCommit.oid is empty"
                exit 1
              fi
              echo "✅ Version-bump PR #$PR_NUMBER merged at $BUMP_SHA"
              echo "BUMP_SHA=$BUMP_SHA" >> $GITHUB_ENV
              exit 0
            elif [[ "$STATE" == "CLOSED" ]]; then
              echo "::error::Version-bump PR #$PR_NUMBER was closed without merging — aborting tag creation"
              exit 1
            fi

            echo "[attempt $i/40] PR state: $STATE — waiting 30s..."
            sleep 30
          done

          # Timeout. Provide actionable guidance that depends on whether
          # the maintainer set up RELEASE_TOKEN.
          if [[ "$USING_PAT" == "true" ]]; then
            echo "::error::Version-bump PR #$PR_NUMBER did not merge within 20 min."
            echo "::error::RELEASE_TOKEN is configured, so CI should have run. Check the PR's checks tab — something is failing or the PAT lacks the necessary scopes (needs Contents R/W + Pull requests R/W)."
          else
            echo "::error::Version-bump PR #$PR_NUMBER did not merge within 20 min."
            echo "::error::RELEASE_TOKEN is NOT set. The bump PR was opened with GITHUB_TOKEN, which suppresses CI on the PR. To unblock NOW: close+reopen PR #$PR_NUMBER (or push an empty commit to its branch) — that fires CI, auto-merge then completes, and the tag will need to be created manually at the squash SHA. To avoid this in the future, add a RELEASE_TOKEN repo secret (PAT or GitHub App with Contents R/W + Pull requests R/W)."
          fi
          echo "::error::Tag was NOT created."
          exit 1

      - name: Create and push tag at version-bump commit
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false' && env.BUMP_SHA
        run: |
          set -euo pipefail
          git fetch --quiet origin main

          TAG_NAME="v${{ env.NEW_VERSION }}"
          BUMP_SHA="${{ env.BUMP_SHA }}"

          echo "Creating tag $TAG_NAME on version-bump commit $BUMP_SHA"

          # Guard: skip if tag already exists
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "⚠️ Tag $TAG_NAME already exists, skipping tag creation"
            exit 0
          fi

          # Sanity check: package.json at BUMP_SHA must match TAG_NAME.
          # If this ever fails we want to know LOUDLY rather than mint another
          # malformed tag.
          PKG_AT_BUMP=$(git show "$BUMP_SHA:package.json" | jq -r '.version')
          if [[ "$PKG_AT_BUMP" != "${{ env.NEW_VERSION }}" ]]; then
            echo "::error::package.json at $BUMP_SHA = $PKG_AT_BUMP, expected ${{ env.NEW_VERSION }}. Refusing to mint a malformed tag."
            exit 1
          fi

          git tag -a "$TAG_NAME" "$BUMP_SHA" -m "Release $TAG_NAME

          Auto-release following PR merge:
          - ${{ github.event.pull_request.title }}
          - PR #${{ github.event.pull_request.number }} by @${{ github.event.pull_request.user.login }}
          - Type: ${{ steps.version-type.outputs.version_type }} version bump
          - Tagged at version-bump commit $BUMP_SHA (package.json verified to match $TAG_NAME)

          This tag will trigger:
          - AI-enhanced release notes generation
          - NPM package publishing
          - Documentation updates"

          git push origin "$TAG_NAME"

          echo "✅ Tag $TAG_NAME created on $BUMP_SHA and pushed"

      - name: Publish Release (from Draft or New)
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false' && env.BUMP_SHA
        run: |
          # Guard: skip if a release already exists for this tag
          if gh api repos/${{ github.repository }}/releases/tags/v${{ env.NEW_VERSION }} > /dev/null 2>&1; then
            echo "⚠️ Release v${{ env.NEW_VERSION }} already exists, skipping release creation"
            exit 0
          fi

          if [[ "${{ steps.find-draft.outputs.draft_found }}" == "true" ]]; then
            echo "📤 Publishing existing Release Drafter draft..."

            gh api repos/${{ github.repository }}/releases/${{ steps.find-draft.outputs.draft_id }} \
              --method PATCH \
              --field tag_name="${{ steps.update-draft.outputs.updated_tag }}" \
              --field name="${{ steps.update-draft.outputs.updated_name }}" \
              --field body="$(cat enhanced_release_notes.md)" \
              --field draft=false \
              --field prerelease=false

            echo "✅ Successfully published Release Drafter draft as v${{ env.NEW_VERSION }}"
          else
            echo "📤 Creating new release..."

            gh api repos/${{ github.repository }}/releases \
              --method POST \
              --field tag_name="v${{ env.NEW_VERSION }}" \
              --field name="Release v${{ env.NEW_VERSION }}" \
              --field body="$(cat enhanced_release_notes.md)" \
              --field draft=false \
              --field prerelease=false

            echo "✅ Successfully created new release v${{ env.NEW_VERSION }}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.config.outputs.enabled == 'true' && steps.should-skip.outputs.should_skip == 'false'
        run: |
          echo "## 🎉 Auto-release completed!" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: v${{ env.NEW_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Type**: ${{ steps.version-type.outputs.version_type }} bump" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})" >> $GITHUB_STEP_SUMMARY
          echo "**Author**: @${{ github.event.pull_request.user.login }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.find-draft.outputs.draft_found }}" == "true" ]]; then
            echo "**Release Method**: 📝 Published Release Drafter draft" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Release Method**: 🆕 Created new release" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Version-bump PR #${{ steps.version-bump-pr.outputs.pull-request-number }} merged at \`${{ env.BUMP_SHA }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Tag v${{ env.NEW_VERSION }} created on the version-bump commit (package.json verified)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Release published" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 AI release notes enhancement will trigger" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 NPM publishing workflow will trigger" >> $GITHUB_STEP_SUMMARY
          echo "- 📚 Documentation will be updated" >> $GITHUB_STEP_SUMMARY

      - name: Skipped Summary
        if: steps.config.outputs.enabled == 'false' || steps.should-skip.outputs.should_skip == 'true'
        run: |
          echo "## ⏭️ Auto-release skipped" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.config.outputs.enabled }}" == "false" ]]; then
            echo "**Reason**: Auto-release disabled in configuration" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Reason**: PR has skip label" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**PR**: ${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To enable auto-release, update `.github/auto-release.config.json` or remove skip labels." >> $GITHUB_STEP_SUMMARY

  # Trigger NPM publishing.
  #
  # Do NOT re-check github.event.pull_request.* here — those have been
  # unreliable in downstream jobs historically (see #787). The
  # `publish-gate` step in `auto-release` is the single source of truth
  # and already factors in PR merged state, skip labels, Dependabot
  # authorship, and the enabled flag.
  #
  # Equality check against 'true' is the simplest GHA-safe comparison:
  # `fromJSON()` had edge cases when the output was an empty string
  # (the previous attempted fix in #808 used fromJSON and still failed).
  publish-npm:
    needs: auto-release
    if: needs.auto-release.outputs.should-publish == 'true'
    uses: ./.github/workflows/publish.yml
    with:
      version: v${{ needs.auto-release.outputs.new-version }}
      skip_tests: false
    # Uses OIDC Trusted Publishing — no NPM_TOKEN required.
    # Trusted Publisher is configured on npmjs.com for this repo + publish.yml.
